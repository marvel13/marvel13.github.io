<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<style>
:root {
    --width: 720px;
    --font-main: 'EB Garamond', 'Helvetica Neue', 'Segoe UI', sans-serif;
    --font-secondary: 'EB Garamond', 'Helvetica Neue', 'Segoe UI', sans-serif;
    --font-scale: 1.26em;
    --background-color: #fffbf0;
    --heading-color: #232333;
    --text-color: #232333;
    --link-color: #232333;
    --visited-color: #232333;
    --main-color: #100429;
    --code-background-color: #f2f2f2;
    --code-color: #222;
    --blockquote-color: #222;
}

body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    background-color: var(--background-color);
    color: var(--text-color);
    line-height: 1.5;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
}

a {
    color: var(--link-color);
    font-family: var(--font-main);
    cursor: pointer;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: #FFC85C;
}

header {
    margin-bottom: 10px;
    padding-bottom: 0;
}

footer {
    margin-top: 40px;
    padding: 25px 0;
    text-align: center;
}

nav a {
    margin-right: 8px;
}

main {
    line-height: 1.6;
}

blockquote {
    border-left: 1px solid #999;
    color: var(--code-color);
    padding-left: 20px;
    font-style: italic;
}

code {
    font-family: monospace;
    padding: 2px;
    background-color: var(--code-background-color);
    color: var(--code-color);
    border-radius: 3px;
}

.highlight, .code {
    padding: 1px 15px;
    background-color: var(--code-background-color);
    color: var(--code-color);
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
}

hr {
    display: none;
}

img {
    max-width: 100%;
}

table {
    width: 100%;
    border-spacing: 0;
}

th, td {
    padding: 6px 13px;
    border: 1px solid #dfe2e5;
    font-size: 1em;
}

ul.blog-posts {
    list-style-type: none;
    padding: unset;
}

ul.blog-posts li {
    margin-bottom: 20px;
}

.post-item {
    display: flex;
    flex-direction: column;
}

.post-link {
    font-weight: 500;
}

.post-link:visited {
    color: var(--visited-color);
}

.post-description {
    color: #9d9d9d;
    font-style: italic;
    font-size: 0.9em;
    margin-top: 2px;
}

.back-arrow {
    display: inline-block;
    font-size: 1.5em;
    color: var(--text-color);
    text-decoration: none;
    margin-bottom: 16px;
}

.back-arrow:hover {
    text-decoration: none;
    opacity: 0.6;
}

.post-year {
    color: #9d9d9d;
    font-size: 0.9em;
}

*, *::before, *::after {
    box-sizing: border-box;
}

html {
    -webkit-text-size-adjust: 100%;
}
</style>
