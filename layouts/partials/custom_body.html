<canvas id="flower-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;"></canvas>
<script>
(function () {
  var canvas = document.getElementById('flower-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var running = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize, { passive: true });

  var SRCS = [
    '/images/flowers/flower-sm.png',
    '/images/flowers/flower-tr-yellow.png',
    '/images/flowers/flower-bl.png',
    '/images/flowers/flower-br.png',
    '/images/flowers/flower-rm.png'
  ];

  var IMGS = SRCS.map(function (src) {
    var img = new Image();
    img.src = src;
    return img;
  });

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function spawn(x, y) {
    var count = 5;
    for (var i = 0; i < count; i++) {
      var angle = Math.PI + Math.random() * Math.PI;
      var speed = 28 + Math.random() * 14;
      var img = IMGS[(Math.random() * IMGS.length) | 0];
      var displaySize = 38 + Math.random() * 22;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: displaySize,
        img: img,
        rot: Math.random() * Math.PI * 2,
        // tilt: direction and amount of the settle wobble
        tilt: (Math.random() > 0.5 ? 1 : -1) * (0.18 + Math.random() * 0.18),
        gravity: 5.0 + Math.random() * 3.0,
        age: 0,
        life: 1,
        decay: 0.007 + Math.random() * 0.004,
        growAge: 0,
        growFrames: 16 + Math.random() * 6
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var alive = [];
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.life <= 0) continue;

      // Draw at current position BEFORE moving — frame 1 renders at exact cursor coords
      p.growAge = Math.min(p.growFrames, p.growAge + 1);
      var t = p.growAge / p.growFrames;
      var scale = t * t;

      // puff up to 1.3x before tilt, deflate back to 1.0x during tilt
      var scaleBoost;
      if (p.age < 14) {
        scaleBoost = 1.0 + 0.3 * easeInOut(p.age / 14);
      } else {
        var deflateT = Math.min(1, (p.age - 14) / 18);
        scaleBoost = 1.3 - 0.3 * easeInOut(deflateT);
      }

      var renderSize = p.size * scale * scaleBoost;
      var opacity = Math.pow(Math.min(1, p.life / 0.65), 3);

      var displayRot = p.rot;
      var tiltT;
      if (p.age > 14 && p.age <= 22) {
        tiltT = easeInOut((p.age - 14) / 8);
        displayRot = p.rot + p.tilt * tiltT;
      } else if (p.age > 22 && p.age <= 32) {
        tiltT = easeInOut((p.age - 22) / 10);
        displayRot = p.rot + p.tilt * (1 - tiltT);
      }

      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(displayRot);
      ctx.drawImage(p.img, -renderSize / 2, -renderSize / 2, renderSize, renderSize);
      ctx.restore();

      // Update physics after draw
      p.vx *= 0.75;
      p.vy *= 0.75;
      var dropPhase = Math.max(0, 0.65 - p.life) / 0.65;
      p.vy += dropPhase * p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.age++;
      p.life -= p.decay;
      if (p.life > 0) alive.push(p);
    }
    particles = alive;
    if (particles.length > 0) {
      requestAnimationFrame(tick);
    } else {
      running = false;
    }
  }

  document.addEventListener('click', function (e) {
    spawn(e.clientX, e.clientY);
    if (!running) {
      running = true;
      requestAnimationFrame(tick);
    }
  }, { passive: true });
})();
</script>
